# Один прогон: path-filter → тесты (+ smoke по путям) → деплой на master (push / ручной запуск).
name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: path-filter
    runs-on: ubuntu-latest
    outputs:
      page_builder: ${{ steps.decide.outputs.page_builder }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect page-builder-related paths
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            page_builder:
              - 'app/PageBuilder/**'
              - 'app/Services/PageBuilder/**'
              - 'resources/views/tenant/themes/**/sections/**'
              - 'app/Livewire/Tenant/PageSectionsBuilder.php'
              - 'tests/Feature/PageBuilder/Smoke/**'
              - 'tests/Support/PageBuilderSmokeFixtures.php'
              - 'tests/Support/AssertsHtmlMarkerOrder.php'
              - 'tests/Support/InteractsWithTenantSmokeHttp.php'
              - 'phpunit.xml'

      - name: Decide page builder smoke
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "page_builder=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.filter.outputs.page_builder }}" = "true" ]; then
            echo "page_builder=true" >> "$GITHUB_OUTPUT"
          else
            echo "page_builder=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: test
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, dom, fileinfo, pdo, tokenizer, xml, ctype, json, bcmath, curl, intl, zip, sqlite, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare application key
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction

      - name: Run tests
        run: composer test

      - name: Diagnostics on failure
        if: failure()
        shell: bash
        run: |
          echo "=== PHP ==="
          php -v || true
          echo "=== Composer ==="
          composer --version || true
          echo "=== PHP extensions (loaded) ==="
          php -m | sort || true
          echo "=== php artisan about ==="
          php artisan about || true
          echo "=== ls -la (repo root) ==="
          ls -la
          echo "=== ls -la storage ==="
          ls -la storage || true
          echo "=== ls -la bootstrap/cache ==="
          ls -la bootstrap/cache || true
          echo "=== Laravel log tail (last 200 lines) ==="
          if [ -f storage/logs/laravel.log ]; then tail -n 200 storage/logs/laravel.log; else echo "(no storage/logs/laravel.log)"; fi

  page-builder-smoke:
    name: page-builder-smoke
    needs: changes
    if: needs.changes.outputs.page_builder == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, pdo, tokenizer, xml, ctype, json, bcmath, curl, intl, zip, sqlite, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare application key
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction

      - name: Run page builder smoke suite
        env:
          APP_ENV: testing
        run: composer test:page-builder-smoke

  # Opt-in: set repository variable PLAYWRIGHT_E2E_ENABLED=true and Actions secrets below.
  # Does not gate deploy; use for regression runs when tenant admin URL and credentials are available.
  playwright-e2e:
    name: playwright-e2e
    needs: test
    if: vars.PLAYWRIGHT_E2E_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        env:
          PLAYWRIGHT_E2E: '1'
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_ADMIN_EMAIL }}
          PLAYWRIGHT_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_ADMIN_PASSWORD }}
          PLAYWRIGHT_PAGE_BUILDER_PATH: ${{ secrets.PLAYWRIGHT_PAGE_BUILDER_PATH }}
        run: npm run test:e2e

  deploy:
    name: deploy
    needs: [test, page-builder-smoke]
    if: ${{ always() && needs.test.result == 'success' && (needs.page-builder-smoke.result == 'success' || needs.page-builder-smoke.result == 'skipped') && github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Setup SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ vars.SSH_PORT }}" -H "${{ vars.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer deps
        run: composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Build assets
        run: |
          npm ci
          npm run build

      - name: Build deploy archive
        shell: bash
        run: |
          set -euo pipefail

          rm -rf /tmp/deploy-src
          mkdir -p /tmp/deploy-src

          git archive --format=tar HEAD | tar -x -C /tmp/deploy-src

          if [ -d vendor ]; then
            cp -R vendor /tmp/deploy-src/vendor
          fi

          rm -f /tmp/deploy-src/.env || true
          rm -f /tmp/deploy-src/.env.* || true

          rm -rf /tmp/deploy-src/storage || true
          rm -rf /tmp/deploy-src/bootstrap/cache || true

          mkdir -p /tmp/deploy-src/public/build
          cp -r public/build/. /tmp/deploy-src/public/build/

          rm -rf /tmp/deploy-src/node_modules || true
          rm -rf /tmp/deploy-src/tests || true
          rm -f /tmp/deploy-src/phpunit.xml || true

          tar -C /tmp/deploy-src -czf deploy.tgz .

      - name: Upload + deploy on server
        shell: bash
        env:
          SSH_PORT: "${{ vars.SSH_PORT }}"
          SSH_USER: "${{ vars.SSH_USER }}"
          SSH_HOST: "${{ vars.SSH_HOST }}"
          DEPLOY_TMP: "${{ vars.DEPLOY_TMP }}"
          DEPLOY_PATH: "${{ vars.DEPLOY_PATH }}"
          # Опционально: 1 — не запускать tenant-storage:sync-replica при деплое
          DEPLOY_SKIP_R2_SYNC: "${{ vars.DEPLOY_SKIP_R2_SYNC }}"
          # Опционально: public | private | both (по умолчанию public)
          DEPLOY_R2_SYNC_SCOPE: "${{ vars.DEPLOY_R2_SYNC_SCOPE }}"
          # Опционально: 1 — при ошибке sync не ронять весь деплой (лог на сервере: storage/logs/tenant-sync-replica.log)
          DEPLOY_R2_SYNC_NON_BLOCKING: "${{ vars.DEPLOY_R2_SYNC_NON_BLOCKING }}"
        run: |
          set -euo pipefail

          REMOTE="${SSH_USER}@${SSH_HOST}"
          TMP="${DEPLOY_TMP}"
          DEST="${DEPLOY_PATH}"

          ssh -p "$SSH_PORT" "$REMOTE" "set -e; mkdir -p '$TMP' '$DEST'; rm -rf '$TMP/release' '$TMP/preserve'; mkdir -p '$TMP/release' '$TMP/preserve'"
          scp -P "$SSH_PORT" deploy.tgz "$REMOTE:$TMP/deploy.tgz"

          ssh -p "$SSH_PORT" "$REMOTE" "DEPLOY_TMP='$TMP' DEPLOY_PATH='$DEST' DEPLOY_SKIP_R2_SYNC='${DEPLOY_SKIP_R2_SYNC:-0}' DEPLOY_R2_SYNC_SCOPE='${DEPLOY_R2_SYNC_SCOPE:-public}' DEPLOY_R2_SYNC_NON_BLOCKING='${DEPLOY_R2_SYNC_NON_BLOCKING:-0}' sh -se" <<'EOF'
          set -eu
          (set -o pipefail) 2>/dev/null && set -o pipefail || true

          TMP="${DEPLOY_TMP}"
          DEST="${DEPLOY_PATH}"
          REL="$TMP/release"
          PRES="$TMP/preserve"

          tar -xzf "$TMP/deploy.tgz" -C "$REL"
          rm -f "$TMP/deploy.tgz"

          preserve_move () {
            p="$1"
            if [ -e "$DEST/$p" ]; then
              mkdir -p "$PRES/$(dirname "$p" 2>/dev/null || echo .)"
              mv "$DEST/$p" "$PRES/$p"
            fi
          }

          restore_back () {
            p="$1"
            if [ -e "$PRES/$p" ]; then
              rm -rf "$DEST/$p" 2>/dev/null || true
              mkdir -p "$DEST/$(dirname "$p" 2>/dev/null || echo .)"
              mv "$PRES/$p" "$DEST/$p"
            fi
          }

          preserve_move ".env"
          preserve_move "storage"
          preserve_move "bootstrap/cache"
          preserve_move "public/storage"
          preserve_move "public/uploads"
          preserve_move "uploads"
          preserve_move "public/.well-known"
          preserve_move "public/images"

          find "$DEST" -mindepth 1 -maxdepth 1 \
            ! -name ".deploy_tmp" \
            -exec rm -rf {} \;

          cp -R "$REL"/. "$DEST"/

          restore_back ".env"
          restore_back "storage"
          restore_back "bootstrap/cache"
          restore_back "public/storage"
          restore_back "public/uploads"
          restore_back "uploads"
          restore_back "public/.well-known"
          restore_back "public/images"

          mkdir -p "$DEST/storage/framework/cache/data"
          mkdir -p "$DEST/storage/framework/sessions"
          mkdir -p "$DEST/storage/framework/views"
          mkdir -p "$DEST/storage/logs"
          mkdir -p "$DEST/bootstrap/cache"

          chmod -R 775 "$DEST/storage" 2>/dev/null || true
          chmod -R 775 "$DEST/bootstrap/cache" 2>/dev/null || true

          if [ -f "$DEST/artisan" ]; then
            cd "$DEST"

            # 🔥 сначала права
            sudo chown -R www-data:www-data "$DEST/storage" "$DEST/bootstrap/cache"
            sudo chmod -R 775 "$DEST/storage" "$DEST/bootstrap/cache"

            # Сначала сбрасываем скомпилированные bootstrap-кэши, чтобы migrate/sync
            # читали актуальные config/*.php и .env сервера, а не старый config cache.
            php artisan optimize:clear || true

            # потом artisan
            php artisan storage:link || true
            php artisan migrate --force

            # Двусторонняя догонка зеркала ↔ R2 без удалений (см. tenant-storage:sync-replica).
            # Отключить: GitHub vars DEPLOY_SKIP_R2_SYNC=1
            # Область: GitHub vars DEPLOY_R2_SYNC_SCOPE (public | private | both)
            # Ошибка sync при set -e раньше роняла весь шаг сразу после migrate — обрабатываем явно.
            if [ "${DEPLOY_SKIP_R2_SYNC:-0}" != "1" ]; then
              if ! php artisan tenant-storage:sync-replica --no-interaction --scope="${DEPLOY_R2_SYNC_SCOPE:-public}" >> "$DEST/storage/logs/tenant-sync-replica.log" 2>&1; then
                echo "Deploy: tenant-storage:sync-replica failed (see ${DEST}/storage/logs/tenant-sync-replica.log on the server)." >&2
                if [ "${DEPLOY_R2_SYNC_NON_BLOCKING:-0}" = "1" ]; then
                  echo "Deploy: continuing because DEPLOY_R2_SYNC_NON_BLOCKING=1." >&2
                else
                  exit 1
                fi
              fi
            fi

            # Оставляем runtime после деплоя в чистом состоянии без старых кэшей.
            php artisan config:clear
            php artisan cache:clear
            php artisan route:clear
            php artisan view:clear

            # сервисы
            sudo systemctl restart php8.3-fpm
            sudo systemctl reload nginx
            sudo systemctl restart laravel-queue
          fi

          rm -rf "$REL" "$PRES" 2>/dev/null || true
          EOF

      - name: Post-deploy smoke
        shell: bash
        env:
          SMOKE_MARKETING_URL: "${{ vars.SMOKE_MARKETING_URL }}"
          SMOKE_PLATFORM_URL: "${{ vars.SMOKE_PLATFORM_URL }}"
          SMOKE_TENANT_URL: "${{ vars.SMOKE_TENANT_URL }}"
        run: |
          set -euo pipefail

          if [ -z "${SMOKE_MARKETING_URL:-}" ]; then
            echo "Post-deploy smoke: SMOKE_MARKETING_URL is not set. Add it in Repo Settings → Secrets and variables → Actions → Variables."
            exit 1
          fi
          if [ -z "${SMOKE_PLATFORM_URL:-}" ]; then
            echo "Post-deploy smoke: SMOKE_PLATFORM_URL is not set. Add it in Repo Settings → Secrets and variables → Actions → Variables."
            exit 1
          fi

          echo "Post-deploy smoke: waiting 5s after deploy restarts..."
          sleep 5

          curl_common=( -fsSL --connect-timeout 10 --max-time 30 --retry 3 --retry-delay 2 --retry-connrefused -o /dev/null )

          check_url() {
            local label="$1" url="$2"
            echo "Post-deploy smoke: checking ${label} → ${url}"
            curl "${curl_common[@]}" "${url}"
          }

          check_url "Marketing" "${SMOKE_MARKETING_URL%/}/"
          check_url "Platform" "${SMOKE_PLATFORM_URL%/}/"
          if [ -n "${SMOKE_TENANT_URL:-}" ]; then
            check_url "Tenant landing" "${SMOKE_TENANT_URL%/}/"
          else
            echo "Post-deploy smoke: Tenant landing skipped (set SMOKE_TENANT_URL to enable)."
          fi

          echo "Post-deploy smoke passed"

  # Докачка в локальное зеркало (MEDIA_LOCAL_ROOT) объектов из R2, которых нет на диске.
  # Не создаёт файлы «из воздуха» — только то, что уже есть в бакете. См. tenant-media:backfill-from-r2.
  # По умолчанию artisan запускается от SSH-пользователя (без sudo). Vars MEDIA_BACKFILL_AS_WWW_DATA=1
  # только если на сервере настроен passwordless sudo для «sudo -u www-data» у этого пользователя.
  media_backfill:
    name: media-backfill-local-mirror
    needs: deploy
    if: ${{ github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.deploy.result == 'success' && vars.DEPLOY_SKIP_MEDIA_BACKFILL != '1' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Setup SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ vars.SSH_PORT }}" -H "${{ vars.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Backfill mirror from R2 on server
        shell: bash
        env:
          SSH_PORT: "${{ vars.SSH_PORT }}"
          SSH_USER: "${{ vars.SSH_USER }}"
          SSH_HOST: "${{ vars.SSH_HOST }}"
          DEPLOY_PATH: "${{ vars.DEPLOY_PATH }}"
          MEDIA_LOCAL_ROOT: "${{ vars.MEDIA_LOCAL_ROOT }}"
          MEDIA_BACKFILL_AS_WWW_DATA: "${{ vars.MEDIA_BACKFILL_AS_WWW_DATA }}"
        run: |
          set -euo pipefail

          REMOTE="${SSH_USER}@${SSH_HOST}"
          APP_DIR="${DEPLOY_PATH}"
          MEDIA_ROOT="${MEDIA_LOCAL_ROOT:-/srv/rentbase-media}"
          MEDIA_BACKFILL_AS_WWW_DATA="${MEDIA_BACKFILL_AS_WWW_DATA:-0}"

          ssh -p "$SSH_PORT" "$REMOTE" "APP_DIR='${APP_DIR}' MEDIA_ROOT='${MEDIA_ROOT}' MEDIA_BACKFILL_AS_WWW_DATA='${MEDIA_BACKFILL_AS_WWW_DATA}' sh -se" <<'EOF'
          set -eu
          (set -o pipefail) 2>/dev/null && set -o pipefail || true

          if [ ! -d "$APP_DIR" ]; then
            echo "media-backfill: app dir not found: $APP_DIR"
            exit 1
          fi

          if [ ! -d "$MEDIA_ROOT" ]; then
            echo "media-backfill: media root not found: $MEDIA_ROOT (set MEDIA_LOCAL_ROOT Actions variable if path differs)"
            exit 1
          fi

          LOG="$APP_DIR/storage/logs/tenant-media-backfill.log"
          mkdir -p "$(dirname "$LOG")"

          run_backfill () {
            if [ "${MEDIA_BACKFILL_AS_WWW_DATA:-0}" != "0" ]; then
              sudo -n -u www-data sh -lc "
                set -e
                cd '$APP_DIR'
                php artisan optimize:clear >/dev/null 2>&1 || true
                php artisan tenant-media:backfill-from-r2 \
                  --target='$MEDIA_ROOT' \
                  --only-missing \
                  --no-interaction >> '$LOG' 2>&1
              "
            else
              cd "$APP_DIR"
              php artisan optimize:clear >/dev/null 2>&1 || true
              php artisan tenant-media:backfill-from-r2 \
                --target="$MEDIA_ROOT" \
                --only-missing \
                --no-interaction >> "$LOG" 2>&1
            fi
          }

          run_backfill

          echo "media-backfill: finished (log: $LOG)"
          echo "media-backfill: tail of log"
          tail -n 50 "$LOG" || true
          EOF
