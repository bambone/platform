[motolevins.local]

base_url          = {host_scheme}://{host_decoded}{scheme_port}
environment       = System
http_engine       = Apache
php_engine        = PHP-8.3
project_enabled   = on
project_root      = {base_dir}
terminal_codepage = 65001
tls_cert_file     = auto
tls_enabled       = on
tls_key_file      = auto
web_root          = {base_dir}\public

