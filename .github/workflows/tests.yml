# Top-level name must stay exactly "Tests" — deploy workflow_run references it.
# Page builder smoke is a second job here (same run), not a separate workflow — avoids two full runners for one commit.
# Jobs: path-filter (changes) → then test and page-builder-smoke in parallel (smoke only if paths matched or workflow_dispatch).
name: Tests

on:
  # Push only on default branch: for PRs, pull_request already runs tests — otherwise push + synchronize
  # use different refs and bypass concurrency dedupe (two complete "Tests" runs per commit).
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: path-filter
    runs-on: ubuntu-latest
    outputs:
      page_builder: ${{ steps.decide.outputs.page_builder }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect page-builder-related paths
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            page_builder:
              - 'app/PageBuilder/**'
              - 'app/Services/PageBuilder/**'
              - 'resources/views/tenant/themes/**/sections/**'
              - 'app/Livewire/Tenant/PageSectionsBuilder.php'
              - 'tests/Feature/PageBuilder/Smoke/**'
              - 'tests/Support/PageBuilderSmokeFixtures.php'
              - 'tests/Support/AssertsHtmlMarkerOrder.php'
              - 'tests/Support/InteractsWithTenantSmokeHttp.php'
              - 'phpunit.xml'

      - name: Decide page builder smoke
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "page_builder=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.filter.outputs.page_builder }}" = "true" ]; then
            echo "page_builder=true" >> "$GITHUB_OUTPUT"
          else
            echo "page_builder=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: test
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, dom, fileinfo, pdo, tokenizer, xml, ctype, json, bcmath, curl, intl, zip, sqlite, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      # PHPUnit env comes from phpunit.xml; .env is mainly for APP_KEY during artisan.
      # If CI fails on a missing env var, prefer a minimal `env:` block on this job over broad project edits.
      - name: Prepare application key
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction

      - name: Run tests
        run: composer test

      - name: Diagnostics on failure
        if: failure()
        shell: bash
        run: |
          echo "=== PHP ==="
          php -v || true
          echo "=== Composer ==="
          composer --version || true
          echo "=== PHP extensions (loaded) ==="
          php -m | sort || true
          echo "=== php artisan about ==="
          php artisan about || true
          echo "=== ls -la (repo root) ==="
          ls -la
          echo "=== ls -la storage ==="
          ls -la storage || true
          echo "=== ls -la bootstrap/cache ==="
          ls -la bootstrap/cache || true
          echo "=== Laravel log tail (last 200 lines) ==="
          if [ -f storage/logs/laravel.log ]; then tail -n 200 storage/logs/laravel.log; else echo "(no storage/logs/laravel.log)"; fi

  page-builder-smoke:
    name: page-builder-smoke
    needs: changes
    if: needs.changes.outputs.page_builder == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, pdo, tokenizer, xml, ctype, json, bcmath, curl, intl, zip, sqlite, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare application key
        run: |
          cp .env.example .env
          php artisan key:generate --no-interaction

      - name: Run page builder smoke suite
        env:
          APP_ENV: testing
        run: composer test:page-builder-smoke
